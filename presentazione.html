document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"8c11a3bf-0ee5-4ecd-827b-9f2700d2271b\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"6b344b5e-1e8f-4be8-962c-8a1870471f82\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\/style>\n  <style>\n    html,body{margin:0;padding:0;background:#0F332B;}\n    a{color:#1D574B;text-decoration:none;} a:hover{color:#123F35;}\n  <\/style>\n<\/helmet>\n<x-import component-from-global-scope=\"deck-stage\" from=\"ba06fb08-bec5-41d7-93d7-54084d826b45#/deck-stage.js\" width=\"1920\" height=\"1080\" hint-size=\"100%,100%\">\n\n  <section data-label=\"Titolo\" data-speaker-notes=\"Benvenuti. Oggi presentiamo la piattaforma di servizi digitali di Montagna Servizi per Sezioni e Gruppi Regionali CAI. Ogni servizio ha un prototipo funzionante: i link sono nelle slide.\" style=\"font-family:'Manrope',sans-serif;background:linear-gradient(160deg,#0F332B 0%,#123F35 55%,#1D574B 100%);color:#fff;display:flex;flex-direction:column;justify-content:center;padding:0 160px;box-sizing:border-box;\">\n    <img src=\"18be3d31-fbe2-4ab5-b99f-bf505082386f\" alt=\"Montagna Servizi\" style=\"height:110px;width:auto;align-self:flex-start;margin-bottom:70px;\">\n    <div style=\"font-size:26px;font-weight:800;letter-spacing:.14em;color:#9CC5B8;margin-bottom:28px;\">PIATTAFORMA DI SERVIZI PER SEZIONI E GRUPPI REGIONALI CAI<\/div>\n    <h1 style=\"margin:0;font-size:104px;font-weight:800;letter-spacing:-0.02em;line-height:1.05;max-width:1350px;\">Meno gestione,<br>pi\u00f9 montagna.<\/h1>\n    <div style=\"margin-top:44px;font-size:30px;color:#CFE3DB;font-weight:400;max-width:1100px;line-height:1.5;\">Sei servizi digitali, un unico abbonamento. Presentazione con prototipi funzionanti e navigabili.<\/div>\n    <div style=\"margin-top:70px;font-size:24px;color:#7FAF9F;\">Montagna Servizi SCPA \u00b7 luglio 2026<\/div>\n  <\/section>\n\n  <section data-label=\"La piattaforma\" data-speaker-notes=\"La piattaforma estende il portale ticket che le sezioni gi\u00e0 usano. L'abbonamento base \u00e8 il prerequisito: i moduli gestiti in autonomia rientrano nel costo.\" style=\"font-family:'Manrope',sans-serif;background:#fff;color:#123F35;display:flex;flex-direction:column;padding:110px 160px;box-sizing:border-box;\">\n    <div style=\"font-size:24px;font-weight:800;letter-spacing:.14em;color:#1D574B;margin-bottom:24px;\">LA PIATTAFORMA<\/div>\n    <h2 style=\"margin:0 0 30px;font-size:72px;font-weight:800;letter-spacing:-0.02em;line-height:1.1;max-width:1400px;\">Tutto ci\u00f2 di cui la tua Sezione ha bisogno, in un unico posto<\/h2>\n    <div style=\"font-size:29px;color:#41564F;line-height:1.55;max-width:1250px;margin-bottom:70px;\">La piattaforma estende il portale che gi\u00e0 usi per i ticket e i report. Con l\u2019abbonamento base attivi sei servizi pensati per presidenti e segretari \u2014 non per tecnici.<\/div>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:28px;\">\n      <div style=\"background:#F1F7F5;border-radius:20px;padding:38px 42px;\"><div style=\"font-size:26px;font-weight:800;margin-bottom:12px;\">1 \u00b7 Drive Standard<\/div><div style=\"font-size:24px;color:#41564F;line-height:1.5;\">Documenti ordinati, uguali per tutti<\/div><\/div>\n      <div style=\"background:#F1F7F5;border-radius:20px;padding:38px 42px;\"><div style=\"font-size:26px;font-weight:800;margin-bottom:12px;\">2 \u00b7 Verbalizzazione<\/div><div style=\"font-size:24px;color:#41564F;line-height:1.5;\">Dalla convocazione al verbale, con l\u2019AI<\/div><\/div>\n      <div style=\"background:#F1F7F5;border-radius:20px;padding:38px 42px;\"><div style=\"font-size:26px;font-weight:800;margin-bottom:12px;\">3 \u00b7 Ricerca CAI<\/div><div style=\"font-size:24px;color:#41564F;line-height:1.5;\">Statuto e regolamenti, risposte citate<\/div><\/div>\n      <div style=\"background:#F1F7F5;border-radius:20px;padding:38px 42px;\"><div style=\"font-size:26px;font-weight:800;margin-bottom:12px;\">4 \u00b7 Bandi<\/div><div style=\"font-size:24px;color:#41564F;line-height:1.5;\">Opportunit\u00e0 di finanziamento, multi-livello<\/div><\/div>\n      <div style=\"background:#F1F7F5;border-radius:20px;padding:38px 42px;\"><div style=\"font-size:26px;font-weight:800;margin-bottom:12px;\">5 \u00b7 ETS Dashboard<\/div><div style=\"font-size:24px;color:#41564F;line-height:1.5;\">Dati RUNTS sempre sotto controllo<\/div><\/div>\n      <div style=\"background:#F1F7F5;border-radius:20px;padding:38px 42px;\"><div style=\"font-size:26px;font-weight:800;margin-bottom:12px;\">6 \u00b7 Moduli avanzati<\/div><div style=\"font-size:24px;color:#41564F;line-height:1.5;\">Escursioni, sentieristica, crowdfunding<\/div><\/div>\n    <\/div>\n  <\/section>\n\n  <section data-label=\"Drive Standard\" data-speaker-notes=\"Otto cartelle standard uguali per tutte le istanze. 01 Riunioni funge da protocollo. Montagna Servizi mappa il materiale preesistente nel formato standard. La cartella Gerarchia nidifica commissioni e scuole.\" style=\"font-family:'Manrope',sans-serif;background:#fff;color:#123F35;display:flex;box-sizing:border-box;\">\n    <div style=\"flex:1.15;display:flex;flex-direction:column;justify-content:center;padding:0 90px 0 160px;\">\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:.14em;color:#1D574B;margin-bottom:24px;\">SERVIZIO 1 / 6<\/div>\n      <h2 style=\"margin:0 0 34px;font-size:76px;font-weight:800;letter-spacing:-0.02em;line-height:1.08;\">Drive Standard<\/h2>\n      <div style=\"font-size:29px;color:#41564F;line-height:1.6;margin-bottom:46px;\">Un Google Drive strutturato, identico per ogni Sezione, Gruppo Regionale, commissione e scuola. Montagna Servizi migra e mappa il materiale esistente nel formato standard.<\/div>\n      <ul style=\"margin:0 0 60px;padding:0;list-style:none;font-size:27px;line-height:2.1;color:#123F35;\">\n        <li>\u2713&nbsp; 8 cartelle standard, dalla 00 Istituzionali alla 06 Gerarchia<\/li>\n        <li>\u2713&nbsp; La cartella 01 Riunioni funge da protocollo<\/li>\n        <li>\u2713&nbsp; Gerarchia nidificata per commissioni e scuole<\/li>\n      <\/ul>\n      <a href=\"{{ linkDrive }}\" target=\"_blank\" style=\"align-self:flex-start;background:#1D574B;color:#fff;border-radius:999px;padding:22px 46px;font-size:27px;font-weight:800;\">Apri il prototipo \u2192<\/a>\n    <\/div>\n    <div style=\"flex:0.85;background:#F1F7F5;display:flex;align-items:center;justify-content:center;\">\n      <div style=\"background:#fff;border:1px solid #DCE7E2;border-radius:20px;box-shadow:0 12px 40px rgba(15,51,43,.10);padding:50px 60px;font-size:27px;line-height:2.15;color:#123F35;font-weight:600;\">\n        <div style=\"color:#7A8B84;\">GR Lombardia /<\/div>\n        <div style=\"padding-left:40px;\">00 Istituzionali<\/div>\n        <div style=\"padding-left:40px;\">01 Riunioni <span style=\"color:#C77E2A;font-size:24px;\">\u00b7 protocollo<\/span><\/div>\n        <div style=\"padding-left:40px;\">02 Pianificazione e budget<\/div>\n        <div style=\"padding-left:40px;\">03 Comunicazione<\/div>\n        <div style=\"padding-left:40px;\">04 Progetti e collaborazione<\/div>\n        <div style=\"padding-left:40px;\">05 Archivio<\/div>\n        <div style=\"padding-left:40px;\">06 Gerarchia<\/div>\n        <div style=\"padding-left:80px;color:#1D574B;\">\u21b3 OTTO \u00b7 scuole<\/div>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <section data-label=\"Verbalizzazione\" data-speaker-notes=\"Dalla piattaforma si crea la convocazione: invitati recuperati automaticamente, evento Calendar e Meet gestiti da noi. Il giorno dopo la bozza AI arriva al segretario. Flusso: bozza, revisione, commenti, approvazione al consiglio successivo.\" style=\"font-family:'Manrope',sans-serif;background:#F1F7F5;color:#123F35;display:flex;flex-direction:column;justify-content:center;padding:0 160px;box-sizing:border-box;\">\n    <div style=\"font-size:24px;font-weight:800;letter-spacing:.14em;color:#1D574B;margin-bottom:24px;\">SERVIZIO 2 / 6<\/div>\n    <h2 style=\"margin:0 0 34px;font-size:76px;font-weight:800;letter-spacing:-0.02em;line-height:1.08;\">Verbalizzazione automatica delle riunioni<\/h2>\n    <div style=\"font-size:29px;color:#41564F;line-height:1.6;max-width:1300px;margin-bottom:64px;\">Convochi dalla piattaforma: invitati recuperati dalla cartella istituzionale, evento Google Calendar con Meet gestito da Montagna Servizi. Il giorno dopo, il segretario riceve la bozza di verbale generata con AI sulla traccia dell\u2019ODG.<\/div>\n    <div style=\"display:flex;align-items:center;gap:0;margin-bottom:70px;\">\n      <div style=\"flex:1;background:#fff;border:1px solid #DCE7E2;border-radius:20px;padding:34px 30px;text-align:center;\"><div style=\"font-size:24px;font-weight:800;color:#1D574B;\">Convocazione<\/div><div style=\"font-size:24px;color:#66796F;margin-top:8px;\">ODG + Calendar + Meet<\/div><\/div>\n      <div style=\"width:54px;text-align:center;font-size:30px;color:#1D574B;\">\u2192<\/div>\n      <div style=\"flex:1;background:#fff;border:1px solid #DCE7E2;border-radius:20px;padding:34px 30px;text-align:center;\"><div style=\"font-size:24px;font-weight:800;color:#1D574B;\">Bozza AI<\/div><div style=\"font-size:24px;color:#66796F;margin-top:8px;\">da trascrizione e registrazione<\/div><\/div>\n      <div style=\"width:54px;text-align:center;font-size:30px;color:#1D574B;\">\u2192<\/div>\n      <div style=\"flex:1;background:#fff;border:1px solid #DCE7E2;border-radius:20px;padding:34px 30px;text-align:center;\"><div style=\"font-size:24px;font-weight:800;color:#1D574B;\">Revisione<\/div><div style=\"font-size:24px;color:#66796F;margin-top:8px;\">segretario + commenti<\/div><\/div>\n      <div style=\"width:54px;text-align:center;font-size:30px;color:#1D574B;\">\u2192<\/div>\n      <div style=\"flex:1;background:#fff;border:1px solid #DCE7E2;border-radius:20px;padding:34px 30px;text-align:center;\"><div style=\"font-size:24px;font-weight:800;color:#1D574B;\">Approvazione<\/div><div style=\"font-size:24px;color:#66796F;margin-top:8px;\">al consiglio successivo<\/div><\/div>\n    <\/div>\n    <a href=\"{{ linkRiunioni }}\" target=\"_blank\" style=\"align-self:flex-start;background:#1D574B;color:#fff;border-radius:999px;padding:22px 46px;font-size:27px;font-weight:800;\">Apri il prototipo \u2192<\/a>\n  <\/section>\n\n  <section data-label=\"Ricerca CAI\" data-speaker-notes=\"Ricerca conversazionale su tre ambiti: archivio CAI centrale (50 documenti ufficiali reali nel prototipo), i verbali della cartella 01 Riunioni, e la knowledge base costruita dai nostri webinar. Ogni risposta cita i documenti e permette di scaricarli.\" style=\"font-family:'Manrope',sans-serif;background:#fff;color:#123F35;display:flex;box-sizing:border-box;\">\n    <div style=\"flex:1.15;display:flex;flex-direction:column;justify-content:center;padding:0 90px 0 160px;\">\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:.14em;color:#1D574B;margin-bottom:24px;\">SERVIZIO 3 / 6<\/div>\n      <h2 style=\"margin:0 0 34px;font-size:76px;font-weight:800;letter-spacing:-0.02em;line-height:1.08;\">Ricerca avanzata nell\u2019archivio CAI<\/h2>\n      <div style=\"font-size:29px;color:#41564F;line-height:1.6;margin-bottom:46px;\">Fai una domanda in italiano, ottieni una risposta con citazioni e i documenti ufficiali da scaricare. Tre ambiti di ricerca:<\/div>\n      <ul style=\"margin:0 0 60px;padding:0;list-style:none;font-size:27px;line-height:2.1;color:#123F35;\">\n        <li>\u2713&nbsp; Archivio CAI centrale: statuti, regolamenti, delibere e determine<\/li>\n        <li>\u2713&nbsp; I tuoi verbali, nella cartella 01 Riunioni<\/li>\n        <li>\u2713&nbsp; Knowledge base dai webinar di Montagna Servizi<\/li>\n      <\/ul>\n      <a href=\"{{ linkRicerca }}\" target=\"_blank\" style=\"align-self:flex-start;background:#1D574B;color:#fff;border-radius:999px;padding:22px 46px;font-size:27px;font-weight:800;\">Apri il prototipo \u2192<\/a>\n    <\/div>\n    <div style=\"flex:0.85;background:#F1F7F5;display:flex;align-items:center;justify-content:center;padding:60px;\">\n      <div style=\"background:#fff;border:1px solid #DCE7E2;border-radius:20px;box-shadow:0 12px 40px rgba(15,51,43,.10);padding:44px 48px;max-width:560px;\">\n        <div style=\"font-size:24px;font-weight:800;color:#123F35;margin-bottom:20px;\">\u00abQuali regole si applicano ai rifugi CAI?\u00bb<\/div>\n        <div style=\"font-size:24px;color:#41564F;line-height:1.65;margin-bottom:24px;\">La materia \u00e8 disciplinata dal <b>Regolamento Strutture Ricettive<\/b> [1] e dal <b>Contratto-tipo Rifugi<\/b> [2]\u2026<\/div>\n        <div style=\"border-top:1px solid #E4EDE9;padding-top:20px;font-size:24px;line-height:2;color:#1D574B;font-weight:700;\">\n          <div>[1] Regolamento Strutture Ricettive \u00b7 2020 \u00b7 Scarica PDF \u2192<\/div>\n          <div>[2] Contratto-tipo Rifugi \u00b7 2025 \u00b7 Scarica PDF \u2192<\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <section data-label=\"Bandi\" data-speaker-notes=\"Database di opportunit\u00e0 dal livello locale delle fondazioni fino all'Europa, sui temi CAI: sentieristica, Sentiero Italia, rifugi, arrampicata. Filtri per territorio, tema e scadenza. Da ogni bando si richiede il supporto di progettazione per submission ed esecuzione.\" style=\"font-family:'Manrope',sans-serif;background:#F1F7F5;color:#123F35;display:flex;flex-direction:column;justify-content:center;padding:0 160px;box-sizing:border-box;\">\n    <div style=\"font-size:24px;font-weight:800;letter-spacing:.14em;color:#1D574B;margin-bottom:24px;\">SERVIZIO 4 / 6<\/div>\n    <h2 style=\"margin:0 0 34px;font-size:76px;font-weight:800;letter-spacing:-0.02em;line-height:1.08;\">Monitoraggio bandi multi-livello<\/h2>\n    <div style=\"font-size:29px;color:#41564F;line-height:1.6;max-width:1300px;margin-bottom:60px;\">Un database sempre aggiornato di opportunit\u00e0 di finanziamento sui temi CAI \u2014 sentieristica, Sentiero Italia CAI, rifugi, arrampicata \u2014 con filtri per territorio, tema e scadenza.<\/div>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:26px;margin-bottom:64px;\">\n      <div style=\"background:#fff;border:1px solid #DCE7E2;border-radius:20px;padding:34px 36px;\"><div style=\"font-size:24px;font-weight:800;color:#1D574B;margin-bottom:8px;\">Locale<\/div><div style=\"font-size:24px;color:#66796F;line-height:1.5;\">Fondazioni di territorio<\/div><\/div>\n      <div style=\"background:#fff;border:1px solid #DCE7E2;border-radius:20px;padding:34px 36px;\"><div style=\"font-size:24px;font-weight:800;color:#1D574B;margin-bottom:8px;\">Regionale<\/div><div style=\"font-size:24px;color:#66796F;line-height:1.5;\">PSR, leggi regionali, turismo<\/div><\/div>\n      <div style=\"background:#fff;border:1px solid #DCE7E2;border-radius:20px;padding:34px 36px;\"><div style=\"font-size:24px;font-weight:800;color:#1D574B;margin-bottom:8px;\">Nazionale<\/div><div style=\"font-size:24px;color:#66796F;line-height:1.5;\">FO.S.M.IT, Fondo Turismo, Sport<\/div><\/div>\n      <div style=\"background:#fff;border:1px solid #DCE7E2;border-radius:20px;padding:34px 36px;\"><div style=\"font-size:24px;font-weight:800;color:#1D574B;margin-bottom:8px;\">Europeo<\/div><div style=\"font-size:24px;color:#66796F;line-height:1.5;\">Interreg, Erasmus+<\/div><\/div>\n    <\/div>\n    <div style=\"display:flex;align-items:center;gap:40px;\">\n      <a href=\"{{ linkBandi }}\" target=\"_blank\" style=\"background:#1D574B;color:#fff;border-radius:999px;padding:22px 46px;font-size:27px;font-weight:800;\">Apri il prototipo \u2192<\/a>\n      <div style=\"font-size:25px;color:#41564F;\">Da ogni bando: <b>\u00abRichiedi supporto progettazione\u00bb<\/b> per submission ed esecuzione.<\/div>\n    <\/div>\n  <\/section>\n\n  <section data-label=\"ETS Dashboard\" data-speaker-notes=\"La dashboard interroga il RUNTS e confronta i dati di Agenzia delle Entrate e Ministero del Lavoro con la piattaforma CAI, evidenziando le differenze. In pi\u00f9: analisi automatica dei bilanci depositati, benchmark con le altre sezioni e ipotesi di consolidamento.\" style=\"font-family:'Manrope',sans-serif;background:#fff;color:#123F35;display:flex;box-sizing:border-box;\">\n    <div style=\"flex:1.15;display:flex;flex-direction:column;justify-content:center;padding:0 90px 0 160px;\">\n      <div style=\"font-size:24px;font-weight:800;letter-spacing:.14em;color:#1D574B;margin-bottom:24px;\">SERVIZIO 5 / 6<\/div>\n      <h2 style=\"margin:0 0 34px;font-size:76px;font-weight:800;letter-spacing:-0.02em;line-height:1.08;\">ETS Dashboard \u2014 controllo qualit\u00e0 RUNTS<\/h2>\n      <div style=\"font-size:29px;color:#41564F;line-height:1.6;margin-bottom:46px;\">Interroga il Registro Unico Nazionale del Terzo Settore e confronta i dati ufficiali con la piattaforma CAI, segnalando ogni differenza prima che diventi un problema.<\/div>\n      <ul style=\"margin:0 0 60px;padding:0;list-style:none;font-size:27px;line-height:2.1;color:#123F35;\">\n        <li>\u2713&nbsp; Confronto RUNTS \u2194 piattaforma CAI, differenze evidenziate<\/li>\n        <li>\u2713&nbsp; Analisi automatica dei bilanci depositati<\/li>\n        <li>\u2713&nbsp; Benchmark con sezioni, GR e CAI centrale + consolidamento<\/li>\n      <\/ul>\n      <a href=\"{{ linkEts }}\" target=\"_blank\" style=\"align-self:flex-start;background:#1D574B;color:#fff;border-radius:999px;padding:22px 46px;font-size:27px;font-weight:800;\">Apri il prototipo \u2192<\/a>\n    <\/div>\n    <div style=\"flex:0.85;background:#F1F7F5;display:flex;align-items:center;justify-content:center;padding:60px;\">\n      <div style=\"background:#fff;border:1px solid #DCE7E2;border-radius:20px;box-shadow:0 12px 40px rgba(15,51,43,.10);padding:44px 48px;min-width:480px;\">\n        <div style=\"font-size:24px;font-weight:800;letter-spacing:.08em;color:#7A8B84;margin-bottom:22px;\">CONTROLLO DI OGGI<\/div>\n        <div style=\"display:flex;justify-content:space-between;font-size:24px;padding:14px 0;border-bottom:1px solid #E4EDE9;\"><span>Campi controllati<\/span><b>8<\/b><\/div>\n        <div style=\"display:flex;justify-content:space-between;font-size:24px;padding:14px 0;border-bottom:1px solid #E4EDE9;color:#C77E2A;\"><span>Differenze rilevate<\/span><b>4<\/b><\/div>\n        <div style=\"display:flex;justify-content:space-between;font-size:24px;padding:14px 0;\"><span>Bilanci analizzati<\/span><b>3 esercizi<\/b><\/div>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <section data-label=\"Moduli avanzati\" data-speaker-notes=\"I moduli in lavorazione: prenotazione escursioni con avviso ai responsabili (gi\u00e0 nel prototipo), rendicontazione sentieristica sperimentata con il Friuli Venezia Giulia, e campagne di crowdfunding.\" style=\"font-family:'Manrope',sans-serif;background:#F1F7F5;color:#123F35;display:flex;flex-direction:column;justify-content:center;padding:0 160px;box-sizing:border-box;\">\n    <div style=\"font-size:24px;font-weight:800;letter-spacing:.14em;color:#1D574B;margin-bottom:24px;\">SERVIZIO 6 / 6 \u00b7 IN LAVORAZIONE<\/div>\n    <h2 style=\"margin:0 0 34px;font-size:76px;font-weight:800;letter-spacing:-0.02em;line-height:1.08;\">Moduli avanzati<\/h2>\n    <div style=\"font-size:29px;color:#41564F;line-height:1.6;max-width:1300px;margin-bottom:60px;\">Funzionalit\u00e0 in sperimentazione con le prime sezioni pilota, incluse nell\u2019abbonamento quando gestite in autonomia.<\/div>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:28px;margin-bottom:64px;\">\n      <div style=\"background:#fff;border:1px solid #DCE7E2;border-radius:20px;padding:44px 46px;\">\n        <div style=\"font-size:27px;font-weight:800;margin-bottom:14px;\">Prenotazione escursioni<\/div>\n        <div style=\"font-size:24px;color:#41564F;line-height:1.55;\">Form di iscrizione, flusso di registrazione e avviso automatico ai responsabili. Sperimentato con GR Lombardia.<\/div>\n      <\/div>\n      <div style=\"background:#fff;border:1px solid #DCE7E2;border-radius:20px;padding:44px 46px;\">\n        <div style=\"font-size:27px;font-weight:800;margin-bottom:14px;\">Rendicontazione sentieristica<\/div>\n        <div style=\"font-size:24px;color:#41564F;line-height:1.55;\">Generazione automatica, sperimentata con il Friuli Venezia Giulia.<\/div>\n      <\/div>\n      <div style=\"background:#fff;border:1px solid #DCE7E2;border-radius:20px;padding:44px 46px;\">\n        <div style=\"font-size:27px;font-weight:800;margin-bottom:14px;\">Crowdfunding<\/div>\n        <div style=\"font-size:24px;color:#41564F;line-height:1.55;\">Campagne di raccolta fondi per progetti di Sezione.<\/div>\n      <\/div>\n      <div style=\"background:#fff;border:1px solid #DCE7E2;border-radius:20px;padding:44px 46px;\">\n        <div style=\"font-size:27px;font-weight:800;margin-bottom:14px;\">Bilancio sociale<\/div>\n        <div style=\"font-size:24px;color:#41564F;line-height:1.55;\">Redazione guidata del bilancio sociale secondo le linee guida ministeriali.<\/div>\n      <\/div>\n    <\/div>\n    <a href=\"{{ linkEscursioni }}\" target=\"_blank\" style=\"align-self:flex-start;background:#1D574B;color:#fff;border-radius:999px;padding:22px 46px;font-size:27px;font-weight:800;\">Apri il prototipo escursioni \u2192<\/a>\n  <\/section>\n\n  <section data-label=\"Roadmap\" data-speaker-notes=\"Due rilasci: il 1\u00b0 settembre 2026 tutti i servizi base tranne la ETS Dashboard; il 1\u00b0 ottobre i servizi avanzati e la ETS Dashboard. Chi aderisce entro il 30 settembre blocca la quota Early Bird.\" style=\"font-family:'Manrope',sans-serif;background:#fff;color:#123F35;display:flex;flex-direction:column;justify-content:center;padding:0 160px;box-sizing:border-box;\">\n    <div style=\"font-size:24px;font-weight:800;letter-spacing:.14em;color:#1D574B;margin-bottom:24px;\">ROADMAP<\/div>\n    <h2 style=\"margin:0 0 70px;font-size:76px;font-weight:800;letter-spacing:-0.02em;line-height:1.08;\">Quando arrivano i servizi<\/h2>\n    <div style=\"display:flex;align-items:stretch;gap:0;max-width:1500px;\">\n      <div style=\"flex:1;position:relative;padding-top:56px;\">\n        <div style=\"position:absolute;top:20px;left:0;right:0;height:4px;background:#1D574B;border-radius:99px;\"><\/div>\n        <div style=\"position:absolute;top:8px;left:0;width:28px;height:28px;border-radius:50%;background:#1D574B;border:6px solid #fff;box-shadow:0 0 0 2px #1D574B;box-sizing:border-box;\"><\/div>\n        <div style=\"margin-right:60px;background:#F1F7F5;border-radius:20px;padding:44px 48px;\">\n          <div style=\"font-size:26px;font-weight:800;color:#1D574B;margin-bottom:10px;\">1\u00b0 settembre 2026<\/div>\n          <div style=\"font-size:28px;font-weight:800;margin-bottom:14px;\">Rilascio servizi base<\/div>\n          <div style=\"font-size:25px;color:#41564F;line-height:1.6;\">Drive Standard, Verbalizzazione riunioni, Ricerca CAI, Monitoraggio bandi e Progetti in corso. <span style=\"color:#66796F;\">Esclusa la ETS Dashboard.<\/span><\/div>\n        <\/div>\n      <\/div>\n      <div style=\"flex:1;position:relative;padding-top:56px;\">\n        <div style=\"position:absolute;top:20px;left:0;right:0;height:4px;background:#1D574B;border-radius:99px;\"><\/div>\n        <div style=\"position:absolute;top:8px;left:0;width:28px;height:28px;border-radius:50%;background:#C77E2A;border:6px solid #fff;box-shadow:0 0 0 2px #C77E2A;box-sizing:border-box;\"><\/div>\n        <div style=\"margin-right:60px;background:#F1F7F5;border-radius:20px;padding:44px 48px;\">\n          <div style=\"font-size:26px;font-weight:800;color:#C77E2A;margin-bottom:10px;\">1\u00b0 ottobre 2026<\/div>\n          <div style=\"font-size:28px;font-weight:800;margin-bottom:14px;\">Rilascio servizi avanzati + ETS Dashboard<\/div>\n          <div style=\"font-size:25px;color:#41564F;line-height:1.6;\">ETS Dashboard con controllo RUNTS e benchmark, moduli avanzati: escursioni, rendicontazione sentieristica, crowdfunding.<\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n\n  <\/section>\n\n  <section data-label=\"Pricing\" data-speaker-notes=\"Abbonamento base 250 euro l'anno, 12 mesi. Early Bird a 200 euro per chi aderisce entro il 30 settembre 2026: dal primo ottobre si torna a 250. L'abbonamento base \u00e8 il prerequisito per i servizi avanzati; i moduli gestiti in autonomia sono inclusi.\" style=\"font-family:'Manrope',sans-serif;background:linear-gradient(160deg,#0F332B 0%,#123F35 60%,#1D574B 100%);color:#fff;display:flex;flex-direction:column;justify-content:center;padding:0 160px;box-sizing:border-box;\">\n    <div style=\"font-size:24px;font-weight:800;letter-spacing:.14em;color:#9CC5B8;margin-bottom:24px;\">QUANTO COSTA<\/div>\n    <h2 style=\"margin:0 0 60px;font-size:76px;font-weight:800;letter-spacing:-0.02em;line-height:1.08;\">Un abbonamento, tutti i servizi base<\/h2>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:36px;max-width:1300px;margin-bottom:56px;\">\n      <div style=\"background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.18);border-radius:24px;padding:52px 56px;\">\n        <div style=\"font-size:25px;font-weight:800;color:#9CC5B8;margin-bottom:16px;\">ABBONAMENTO BASE<\/div>\n        <div style=\"font-size:76px;font-weight:800;\">250 \u20ac<span style=\"font-size:30px;font-weight:600;color:#9CC5B8;\">/anno<\/span><\/div>\n        <div style=\"font-size:24px;color:#CFE3DB;margin-top:16px;line-height:1.6;\">Durata 12 mesi. Prerequisito per attivare i servizi avanzati. I moduli gestiti in autonomia sono inclusi.<\/div>\n      <\/div>\n      <div style=\"background:#fff;color:#123F35;border-radius:24px;padding:52px 56px;position:relative;\">\n        <div style=\"position:absolute;top:-20px;right:44px;background:#C77E2A;color:#fff;border-radius:999px;padding:10px 26px;font-size:24px;font-weight:800;letter-spacing:.06em;\">EARLY BIRD<\/div>\n        <div style=\"font-size:25px;font-weight:800;color:#1D574B;margin-bottom:16px;\">ENTRO IL 30 SETTEMBRE 2026<\/div>\n        <div style=\"font-size:76px;font-weight:800;color:#1D574B;\">200 \u20ac<span style=\"font-size:30px;font-weight:600;color:#66796F;\">/anno<\/span><\/div>\n        <div style=\"font-size:24px;color:#41564F;margin-top:16px;line-height:1.6;\">Risparmi 50 \u20ac sul primo anno. Dal 1\u00b0 ottobre 2026 la quota torna a 250 \u20ac.<\/div>\n      <\/div>\n    <\/div>\n    <div style=\"font-size:24px;color:#9CC5B8;\">Consulenze e servizi avanzati (progettazione bandi, migrazioni documentali\u2026) sono quotati a parte, su richiesta. Per attivarli \u00e8 in ogni caso necessario l&rsquo;abbonamento base.<\/div>\n  <\/section>\n\n  <section data-label=\"Prototipi e contatti\" data-speaker-notes=\"Tutti i prototipi sono navigabili da questa pagina. Raccontaci le esigenze della tua sezione: rispondiamo entro 48 ore.\" style=\"font-family:'Manrope',sans-serif;background:#fff;color:#123F35;display:flex;flex-direction:column;justify-content:center;padding:0 160px;box-sizing:border-box;\">\n    <div style=\"font-size:24px;font-weight:800;letter-spacing:.14em;color:#1D574B;margin-bottom:24px;\">PROVA TU STESSO<\/div>\n    <h2 style=\"margin:0 0 50px;font-size:76px;font-weight:800;letter-spacing:-0.02em;line-height:1.08;\">Tutti i prototipi funzionanti<\/h2>\n    <div style=\"display:grid;grid-template-columns:repeat(3 white-space:nowrap;\">Contattaci \u2192<\/a>\n    <\/div>\n  <\/section>\n\n  <section data-label=\"Grazie\" data-speaker-notes=\"Ringraziare i presenti. Ricordare i contatti e l'offerta Early Bird entro il 30 settembre. Disponibili subito dopo per una demo dal vivo dei prototipi.\" style=\"font-family:'Manrope',sans-serif;background:linear-gradient(160deg,#0F332B 0%,#123F35 55%,#1D574B 100%);color:#fff;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:0 200px;box-sizing:border-box;\">\n    <img src=\"18be3d31-fbe2-4ab5-b99f-bf505082386f\" alt=\"Montagna Servizi\" style=\"height:120px;width:auto;margin-bottom:70px;\">\n    <h2 style=\"margin:0 0 34px;font-size:96px;font-weight:800;letter-spacing:-0.02em;line-height:1.05;\">Grazie.<\/h2>\n    <div style=\"font-size:32px;color:#CFE3DB;line-height:1.6;max-width:1100px;margin-bottom:70px;\">Grazie per l&rsquo;attenzione e per il lavoro che ogni giorno dedicate alla montagna e alla comunit\u00e0. Raccontaci le esigenze della tua Sezione: ti rispondiamo entro 48 ore.<\/div>\n    <a href=\"https://www.montagnaservizi.com/contatti\" target=\"_blank\" style=\"background:#fff;color:#1D574B;border-radius:999px;padding:24px 56px;font-size:28px;font-weight:800;\">Contattaci \u2192<\/a>\n    <div style=\"margin-top:44px;font-size:24px;color:#7FAF9F;\">Early Bird 200 \u20ac/anno fino al 30 settembre 2026<\/div>\n  <\/section>\n\n<\/x-import>\n\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;urlPrototipi&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Link ai prototipi&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    const raw = (this.props.urlPrototipi ?? '').trim();\n    const base = raw || 'piattaforma.html';\n    return {\n      linkDrive: base + '#drive',\n      linkRiunioni: base + '#riunioni',\n      linkRicerca: base + '#ric
