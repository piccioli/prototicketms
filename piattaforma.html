  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

TO Sentieri'],\n];\n\nconst ragScenari = {\n archivio: [\n  { q: 'Quali regole si applicano ai rifugi CAI e ai rapporti con i gestori?',\n    a: 'La materia dei rifugi \u00e8 disciplinata principalmente dal <b>Regolamento Strutture Ricettive<\/b> [1], che definisce classificazione, obblighi delle Sezioni proprietarie e standard di servizio delle strutture. I rapporti con i gestori sono regolati dal <b>Contratto-tipo Rifugi<\/b> [2], aggiornato nel 2025, che stabilisce lo schema contrattuale di riferimento per l\u2019affidamento in gestione. Il quadro generale dei beni e delle strutture \u00e8 inoltre richiamato dal <b>Regolamento Generale<\/b> [3], che disciplina i rapporti tra Sezioni, Gruppi Regionali e Sede centrale.',\n    refs: ['20201223_CAI_Regolamento-Strutture-Ricettive.pdf', '20251017_CAI_Contratto-tipo-Rifugi.pdf', '20230325_CAI_Regolamento-Generale.pdf'] },\n  { q: 'Come si richiede un contributo alla Sede centrale?',\n    a: 'Le richieste di contributo sono disciplinate dal <b>Regolamento Contributi e Patrocini<\/b> [1]: i contributi si distinguono in ordinari e straordinari, con criteri di ammissibilit\u00e0 e scadenze differenti. Le domande vanno presentate usando i modelli ufficiali: <b>Modello richiesta contributo ordinario<\/b> [2] e <b>Modello richiesta contributo straordinario<\/b> [3]. Per interventi legati a eventi calamitosi o situazioni eccezionali \u00e8 attivo anche il <b>Fondo di Mutualit\u00e0<\/b> [4], con apposita domanda di sovvenzione [5].',\n    refs: ['20240119_CAI_Regolamento-Contributi-e-Patrocini.pdf', '20240119_CAI_MODELLO-RICHIESTA-CONTRIBUTO-ORDINARIO.pdf', '20240119_CAI_MODELLO-RICHIESTA-CONTRIBUTO-STRAORDINARIO.pdf', '20161202_CAI_Regolamento-Fondo-di-Mutualita.pdf', '20161202_CAI_Domanda-per-sovvenzione-da-Fondo-Mutualita.doc.pdf'] },\n  { q: 'Quale statuto deve adottare una Sezione che si iscrive al RUNTS come ETS?',\n    a: 'Per l\u2019iscrizione al RUNTS la Sezione deve adottare lo statuto conforme al Codice del Terzo Settore: il riferimento \u00e8 lo <b>Statuto-tipo Sezioni ETS<\/b> [1] approvato nel 2022, nella variante <b>Tipo B ETS<\/b> [2]. Le Sezioni che non si iscrivono al RUNTS mantengono lo <b>Statuto Sezionale Tipo A non ETS<\/b> [3]. Entrambi i modelli devono restare coerenti con lo <b>Statuto del CAI<\/b> [4] approvato dall\u2019Assemblea dei Delegati del 28-29 maggio 2022.',\n    refs: ['20221008_CAI_Statuto-tipo-Sezioni-ETS.pdf', '20220529_CAI_Statuto Sezionale Tipo B ETS.pdf', '2020215_CAI_Statuto Sezionale Tipo A non ETS.pdf', '20220528-29_CAI_Statuto.pdf'] },\n  { q: 'Come funzionano convocazione e voto dell\u2019Assemblea dei Delegati?',\n    a: 'Il funzionamento dell\u2019Assemblea dei Delegati (convocazione, quorum, modalit\u00e0 di voto, mozioni) \u00e8 disciplinato dal <b>Regolamento funzionamento Assemblea Delegati<\/b> [1] del 2023. La partecipazione di soggetti esterni \u00e8 regolata dal <b>Regolamento Invitati AD<\/b> [2]. Le competenze dell\u2019Assemblea e la sua composizione sono fissate dallo <b>Statuto CAI<\/b> [3], mentre il coordinamento con il Comitato Centrale segue il <b>Regolamento funzionamento CC<\/b> [4].',\n    refs: ['20230510_CAI_Regolamento-funzionamento-Assemblea-Delegati.pdf', '20231007_CAI_Regolamento-Invitati-AD.pdf', '20220528-29_CAI_Statuto.pdf', '20241005_CAI_Regolamento-funzionamento-CC.pdf'] },\n ],\n verbali: [\n  { q: 'Cosa \u00e8 stato deciso sul rinnovo delle cariche OTTO?',\n    a: 'Nel <b>verbale OTTO SOL del 14 maggio 2026<\/b> [1] il rinnovo delle cariche \u00e8 stato deliberato al punto 3 dell\u2019ODG: confermata la presidenza uscente e nominati due nuovi componenti. Il <b>verbale CDR dell\u20198 luglio 2026<\/b> [2] ha ratificato le nomine al punto 2, rinviando al Comitato di Presidenza la definizione delle deleghe operative (cfr. <b>verbale del 10 giugno 2026<\/b> [3], punto 4).',\n    refs: [['2026-05-14 Verbale OTTO SOL (approvato).pdf', '01 Riunioni'], ['2026-07-08 Verbale GR Lombardia.gdoc', '01 Riunioni'], ['2026-06-10 Verbale Comitato di Presidenza.gdoc', '01 Riunioni']] },\n  { q: 'Quando \u00e8 stato approvato il consuntivo 2025 e con quali osservazioni?',\n    a: 'Il consuntivo 2025 \u00e8 stato approvato dall\u2019<b>ARD dell\u201911 aprile 2026<\/b> [1] all\u2019unanimit\u00e0, con due osservazioni verbalizzate: adeguare la riclassificazione alle voci standard del Terzo Settore e destinare l\u2019avanzo alla manutenzione della rete sentieristica. Il <b>CDR del 15 aprile 2026<\/b> [2] ha recepito le osservazioni assegnandole alla Tesoreria.',\n    refs: [['Consuntivo 2025 (approvato ARD).pdf', '02 Pianificazione e budget'], ['2026-04-15 Verbale CDR.pdf', '01 Riunioni']] },\n ],\n kb: [\n  { q: 'Quali adempimenti RUNTS deve rispettare una Sezione ETS ogni anno?',\n    a: 'Dal webinar <b>\u00abTerzo Settore per le Sezioni CAI\u00bb<\/b> [1]: gli adempimenti annuali principali sono il deposito del bilancio al RUNTS entro il 30 giugno (redatto per cassa sotto i 220.000 \u20ac di entrate), l\u2019aggiornamento dei dati degli amministratori entro 30 giorni dalle variazioni e la verifica della coerenza tra dati RUNTS e Agenzia delle Entrate. Il webinar <b>\u00abBilanci ETS: modulistica ministeriale\u00bb<\/b> [2] approfondisce i modelli A, B e C del DM 39/2020.',\n    refs: [['Webinar \u2014 Terzo Settore per le Sezioni CAI (feb 2026)', 'Knowledge base MS'], ['Webinar \u2014 Bilanci ETS: modulistica ministeriale (apr 2026)', 'Knowledge base MS']] },\n  { q: 'Come partecipare alla manutenzione del Sentiero Italia CAI?',\n    a: 'Il webinar <b>\u00abSentiero Italia CAI: manutenzione e rendicontazione\u00bb<\/b> [1] descrive il processo: adesione tramite il proprio Gruppo Regionale, presa in carico delle tappe assegnate sul catasto, rendicontazione ore e materiali con la modulistica dedicata. Per i finanziamenti \u00e8 utile il webinar <b>\u00abBandi per la sentieristica\u00bb<\/b> [2], che mappa le linee regionali e il FO.S.M.IT.',\n    refs: [['Webinar \u2014 Sentiero Italia              <\/div>\n                <div>\n                  <label style=\"font-size:13px;font-weight:700;color:#5a6375;display:block;margin-bottom:6px;\">Data<\/label>\n                  <input type=\"date\" value=\"{{ wizData }}\" sc-camel-on-change=\"{{ setWizData }}\" style=\"width:100%;box-sizing:border-box;border:1px solid #dfe3e8;border-radius:7px;padding:8px 12px;font-size:13.5px;color:#3c4557;\">\n                <\/div>\n                <div>\n                  <label style=\"font-size:13px;font-weight:700;color:#5a6375;display:block;margin-bottom:6px;\">Ora<\/label>\n                  <input type=\"time\" value=\"{{ wizOra }}\" sc-camel-on-change=\"{{ setWizOra }}\" style=\"width:100%;box-sizing:border-box;border:1px solid #dfe3e8;border-radius:7px;padding:8px 12px;font-size:13.5px;color:#3c4557;\">\n                <\/div>\n              <\/div>\n              <div style=\"margin-top:16px;font-size:12.5px;color:#6b7486;background:#f1f7f5;border:1px solid #d7ebe3;border-radius:8px;padding:11px 14px;\">L\u2019evento Google Calendar con link Meet e la registrazione della riunione sono gestiti da Montagna Servizi.<\/div>\n            <\/sc-if>\n            <sc-if value=\"{{ wizIs2 }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-size:16px;font-weight:800;color:#3c4557;margin-bottom:6px;\">Invitati<\/div>\n              <div style=\"font-size:12.5px;color:#8b93a3;margin-bottom:16px;\">Recuperati automaticamente dalla cartella <b>00 Istituzionali<\/b> del Drive Standard.<\/div>\n              <sc-for list=\"{{ wizInvitati }}\" as=\"iv\" hint-placeholder-count=\"8\">\n                <label style=\"display:flex;align-items:center;gap:11px;padding:9px 6px;border-bottom:1px solid #f6f7f9;font-size:13.5px;cursor:pointer;\">\n                  <input type=\"checkbox\" checked=\"{{ iv.checked }}\" sc-camel-on-change=\"{{ iv.toggle }}\" style=\"accent-color:#17a180;width:15px;height:15px;\">\n                  <span style=\"font-weight:7 "round\"><path d=\"M20 6L9 17l-5-5\"><\/path><\/svg>\n                  <\/div>\n                  <div style=\"font-size:17px;font-weight:800;color:#3c4557;\">Convocazione inviata<\/div>\n                  <div style=\"font-size:13.5px;color:#6b7486;margin:8px auto 18px;max-width:480px;line-height:1.6;\">Evento creato su Google Calendar con link Meet. Gli invitati hanno ricevuto convocazione e ODG. La registrazione \u00e8 attiva.<\/div>\n                  <div style=\"text-align:left;max-width:520px;margin:0 auto;background:#fafbfc;border:1px solid #eceef1;border-radius:8px;padding:16px 20px;font-size:13px;line-height:1.9;color:#5a6375;\">\n                    <b style=\"color:#3c4557;\">Cosa succede dopo la riunione<\/b><br>\n                    1. Montagna Servizi recupera trascrizione e registrazione<br>\n                    2. L\u2019AI genera la bozza di verbale sulla traccia dell\u2019ODG<br>\n                    3. Il segretario riceve la bozza via mail per la revisione<br>\n                    4. I partecipanti commentano la versione condivisa<br>\n                    5. Il verbale definitivo va in approvazione al consiglio successivo\n                  <\/div>\n                <\/div>\n              <\/sc-if>\n              <sc-if value=\"{{ wizNonInviata }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"font-size:16px;font-weight:800;color:#3c4557;margin-bottom:16px;\">Riepilogo<\/div>\n                <div style=\"font-size:13.5px;line-height:2.1;color:#3c4557;\">\n                  <div><span style=\"color:#8b93a3;display:inline-block;width:170px;\">Organo<\/span><b>{{ wizOrgano }}<\/b><\/div>\n                  <div><span style=\"color:#8b93a3;display:inline-block;width:170px;\">Titolo<\/span><b>{{ wizTitolo }}<\/b><\/div>\n                  <div><span style=\"color:#8b93a3;display:inline-block;width:170px;\">Data e ora<\/span><b>{{ wizQuando }}<\/b><\/div>\n                  <div><span style=\"color:#8b93a3;display:inline-block;width:170px;\">Invitati<\/span><b>{{ wizNInvitati }} partecipanti<\/b> (da 00 Istituzionali)<\/div>\n                  <div><span style=\"color:#8b93a3;display:inline-block;width:170px;\">Punti all\u2019ODG<\/span><b>{{ wizNOdg }}<\/b><\/div>\n                  <div><span style=\"color:#8b93a3;display:inline-block;width:170px;\">Calendar + Meet<\/span><b>gestiti da Montagna Servizi<\/b><\/div>\n                <\/div>\n              <\/sc-if>\n            <\/sc-if>\n            <div style=\"display:flex;justify-content:space-between;margin-top:24px;border-top:1px solid #f0f2f5;padding-top:18px;\">\n              <button sc-camel-on-click=\"{{ wizBack }}\" style=\"{{ wizBackStyle }}\">Indietro<\/button>\n              <button sc-camel-on-click=\"{{ wizNext }}\" style=\"{{ wizNextStyle }}\">{{ wizNextLabel }}<\/button>\n            <\/div>\n          <\/div>\n        <\/sc-if>\n        <sc-if value=\"{{ riuIsVerbali }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#fff;border:1px solid #eceef1;border-radius:10px;box-shadow:0 1px 2px rgba(30,50,40,.05);overflow:hidden;\">\n            <div style=\"display:grid;grid-template-columns:130px 1fr 210px 170px;padding:12px 20px;font-size:11.5px;font-weight:800;letter-spacing:.05em;color:#8b93a3;border-bottom:1px solid #f0f2f5;background:#fafbfc;\">\n              <span>ID<\/span><span>VERBALE<\/span><span>SEGRETARIO<\/span><span>STATO<\/span>\n            <\/div>\n            <sc-for list=\"{{ verbaliList }}\" as=\"v\" hint-placeholder-count=\"4\">\n              <div sc-camel-on-click=\"{{ v.sel }}\" style=\"cursor:pointer;border-bottom:1px solid #f0f2f5;\" style-hover=\"background:#fafbfc;\">\n                <div style=\"display:grid;grid-template-columns:130px 1fr 210px 170px;padding:14px 20px;font-size:13.5px;align-items:center;\">\n                  <a href=\"#riunioni\" style=\"font-weight:700;\">{{ v.id }}<\/a>\n                  <span>{{ v.titolo }}<\/span>\n                  <span style=\"color:#6b7486;\">{{ v.segretario }}<\/span>\n                  <span><span style=\"{{ v.badgeStyle }}\">{{ v.statoLabel }}<\/span><\/span>\n                <\/div>\n                <sc-if value=\"{{ v.aperto }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"padding:6px 20px 20px;\">\n                    <div style=\"display:flex;align-items:flex-start;gap:0;\">\n                      <sc-for list=\"{{ v.timeline }}\" as=\"st\" hint-placeholder-count=\"6\">\n                        <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;position:relative;\">\n                          <span style=\"{{ st.lineStyle }}\"><\/span>\n                          <span style=\"{{ st.dotStyle }}\">{{ st.mark }}<\/span>\n                          <span style=\"{{ st.lblStyle }}\">{{ st.label }}<\/span>\n                        <\/div>\n                      <\/sc-for>\n                    <\/div>\n                  <\/div>\n                <\/sc-if>\n              <\/div>\n            <\/sc-for>\n          <\/div>\n          <div style=\"font-size:12.5px;color:#8b93a3;margin-top:12px;\">Clicca un verbale per vedere la timeline degli stati: bozza AI \u2192 revisione \u2192 commenti dei partecipanti \u2192 approvazione al consiglio successivo.<\/div>\n        <\/sc-if>\n      <\/sc-if>\n\n      <sc-if value=\"{{ show.ricerca }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;background:#e9ecef;border-radius:8px;padding:3px;width:max-content;margin-bottom:18px;\">\n          <span sc-camel-on-click=\"{{ ragTabArchivio }}\" style=\"{{ ragTabArchivioStyle }}\">Archivio CAI centrale<\/span>\n          <span sc-camel-on-click=\"{{ ragTabVerbali }}\" style=\"{{ ragTabVerbaliStyle }}\">Verbali (01 Riunioni)<\/span>\n          <span sc-camel-on-click=\"{{ ragTabKb }}\" style=\"{{ ragTabKbStyle }}\">Knowledge base MS<\/span>\n        <\/div>\n        <div style=\"display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start;\">\n          <div>\n            <div style=\"background:#fff;border:1px solid #eceef1;border-radius:10px;box-shadow:0 1px 2px rgba(30,50,40,.05);padding:18px 20px;\">\n              <div style=\"display:flex;gap:10px;\">\n                <input value=\"{{ ragQuery }}\" sc-camel-on-change=\"{{ setRagQuery }}\" sc-camel-on-key-down=\"{{ ragKeyDown }}\" placeholder=\"{{ ragPlaceholder }}\" style=\"flex:1;border:1px solid #dfe3e8;border-radius:8px;padding:11px 14px;font-size:14px;color:#3c4557;\">\n                <button sc-camel-on-click=\"{{ ragSubmit }}\" style=\"background:#17a180;color:#fff;border:none;border-radius:8px;padding:11px 20px;font-size:13.5px;font-weight:700;cursor:pointer;\" style-hover=\"background:#128a6c;\" style-active=\"transform:translateY(1px);\">Cerca<\/button>\n              <\/div>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;\">\n                <sc-for list=\"{{ ragSuggestions }}\" as=\"sg\" hint-placeholder-count=\"3\">\n                  <span sc-camel-on-click=\"{{ sg.run }}\" style=\"font-size:12.5px;color:#17a180;background:#eef7f3;border:1px solid #cfe8de;border-radius:99px;padding:5px 12px;cursor:pointer;\" style-hover=\"background:#ddf0e8;\">{{ sg.q }}<\/span>\n                <\/sc-for>\n              <\/div>\n            <\/div>\n            <sc-if value=\"{{ ragLoading }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:#fff;border:1px solid #eceef1;border-radius:10px;padding:22px;margin-top:18px;font-size:13.5px;color:#8b93a3;\">Ricerca nei documenti dell\u2019archivio\u2026<\/div>\n            <\/sc-if>\n            <sc-if value=\"{{ ragHasAnswer }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:#fff;border:1px solid #eceef1;border-radius:10px;box-shadow:0 1px 2px rgba(30,50,40,.05);margin-top:18px;\">\n                <div style=\"padding:18px 22px;border-bottom:1px solid #f0f2f5;\">\n                  <d <b style=\"color:#3c4557;\">{{ ex.occupati }}<\/b> / {{ ex.posti }}<\/span><\/div>\n                <div style=\"height:8px;background:#f1f3f5;border-radius:99px;overflow:hidden;\"><div style=\"{{ ex.barStyle }}\"><\/div><\/div>\n              <\/div>\n              <sc-if value=\"{{ ex.pieno }}\" hint-placeholder-val=\"{{ false }}\">\n                <button disabled=\"{{ true }}\" style=\"background:#f1f3f5;color:#a8b0bd;border:none;border-radius:7px;padding:10px 0;font-size:13.5px;font-weight:700;width:100%;\">Posti esauriti \u2014 lista d\u2019attesa<\/button>\n              <\/sc-if>\n              <sc-if value=\"{{ ex.libero }}\" hint-placeholder-val=\"{{ true }}\">\n                <button sc-camel-on-click=\"{{ ex.prenota }}\" style=\"background:#17a180;color:#fff;border:none;border-radius:7px;padding:10px 0;font-size:13.5px;font-weight:700;cursor:pointer;width:100%;\" style-hover=\"background:#128a6c;\" style-active=\"transform:translateY(1px);\">Prenota un posto<\/button>\n              <\/sc-if>\n            <\/div>\n          <\/sc-for>\n        <\/div>\n        <sc-if value=\"{{ escSel }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:fixed;inset:0;background:rgba(30,40,50,.45);z-index:100;display:flex;align-items:center;justify-content:center;\" sc-camel-on-click=\"{{ escChiudi }}\">\n            <div style=\"background:#fff;border-radius:12px;width:520px;max-width:90vw;padding:26px 30px;box-shadow:0 20px 60px rgba(0,0,0,.25);\" sc-camel-on-click=\"{{ stopProp }}\">\n              <sc-if value=\"{{ escInviata }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"text-align:center;padding:8px 0;\">\n                  <div style=\"width:48px;height:48px;border-radius:50%;background:#e5f6ef;border:2px solid #9fdcc9;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;\">\n                    <svg width=\"22\" height=\"22\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#17a180\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\/path><\/svg>\n                  <\/div>\n                  <div style=\"font-size:16px;font-weight:800;color:#3c4557;\">Prenotazione registrata<\/div>\n                  <div style=\"text-align:left;max-width:420px;margin:14px auto 18px;background:#fafbfc;border:1px solid #eceef1;border-radius:8px;padding:14px 18px;font-size:13px;line-height:2;color:#5a6375;\">\n                    <b style=\"color:#3c4557;\">Prossimi passi<\/b><br>\n                    \u2713 Richiesta inviata \u2014 riceverai una mail di riepilogo<br>\n                    \u2713 Il responsabile dell\u2019escursione \u00e8 stato avvisato<br>\n                    \u2192 Conferma del posto entro 48 ore<br>\n                    \u2192 Per i non soci: attivazione assicurazione giornaliera\n                  <\/div>\n                  <button sc-camel-on-click=\"{{ escChiudi }}\" style=\"background:#17a180;color:#fff;border:none;border-radius:7px;padding:9px 20px;font-size:13.5px;font-weight:700;cursor:pointer;\">Chiudi<\/button>\n                <\/div>\n              <\/sc-if>\n              <sc-if value=\"{{ escNonInviata }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"font-size:16px;font-weight:800;color:#3c4557;margin-bottom:4px;\">Prenota un posto<\/div>\n                <div style=\"font-size:13px;color:#8b93a3;margin-bottom:16px;\">{{ escSelTitolo }}<\/div>\n                <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;\">\n                  <div><label style=\"font-size:13px;font-weight:700;color:#5a6375;display:block;margin-bottom:6px;\">Nome e cognome<\/label>\n                    <input value=\"{{ escNome }}\" sc-camel-on-change=\"{{ setEscNome }}\" style=\"width:100%;box-sizing:border-box;border:1px solid #dfe3e8;border-radius:7px;padding:9px 12px;font-size:13.5px;color:#3c4557;\"><\/div>\n                  <div><label style=\"font-size:13px;font-weight:700;color:#5a6375;display:block;margin-bottom:6px;\">Email<\/label>\n                    <input value=\"{{ escEmail }}\" sc-camel-on-change=\"{{ setEscEmail }}\" style=\"width:100%;box-sizing:border-box;border:1px solid #dfe3e8;border-radius:7px;padding:9px 12px;font-size:13.5px;color:#3c4557;\"><\/div>\n                  <div><label style=\"font-size:13px;font-weight:700;color:#5a6375;display:block;margin-bottom:6px;\">Tessera CAI<\/label>\n                    <sc-raw-select style=\"width:100%;border:1px solid #dfe3e8;border-radius:7px;padding:9px 12px;font-size:13.5px;background:#fff;color:#3c4557;\"><option>Socio CAI<\/option><option>Non socio<\/option><\/sc-raw-select><\/div>\n                  <div><label style=\"font-size:13px;font-weight:700;color:#5a6375;display:block;margin-bottom:6px;\">Posti<\/label>\n                    <sc-raw-select style=\"width:100%;border:1px solid #dfe3e8;border-radius:7px;padding:9px 12px;font-size:13.5px;background:#fff;color:#3c4557;\"><option>1<\/option><option>2<\/option><option>3<\/option><\/sc-raw-select><\/div>\n                <\/div>\n                <div style=\"display:flex;justify-content:flex-end;gap:14px;margin-top:20px;\">\n                  <span sc-camel-on-click=\"{{ escChiudi }}\" style=\"font-size:13.5px;color:#8b93a3;cursor:pointer;align-self:center;\">Annulla<\/span>\n                  <button sc-camel-on-click=\"{{ escInvia }}\" style=\"{{ escInviaStyle }}\">Invia prenotazione<\/button>\n                <\/div>\n              <\/sc-if>\n            <\/div>\n          <\/div>\n        <\/sc-if>\n      <\/sc-if>\n\n      <div style=\"flex:1;\"><\/div>\n      <div style=\"text-align:center;font-size:11.5px;color:#a8b0bd;padding:34px 0 4px;\">ORCHESTRATOR MS-1.21.9 (03/01/2026) ENV: local &nbsp;\u00b7&nbsp; Laravel Nova v4.27.13 (Silver Surfer) &nbsp;\u00b7&nbsp; Laravel v10.26.2 &nbsp;\u00b7&nbsp; PHP v8.2.15 &nbsp;\u00b7&nbsp; \u00a9 <a href=\"#dashboard\" style=\"font-weight:800;\">Montagna Servizi SCPA<\/a><\/div>\n    <\/main>\n  <\/div>\n<\/div>\n\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;nomeCliente&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;GR Lombardia&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Cliente&quot;}, &quot;badgeNovita&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Interfaccia&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    route: 'dashboard', data: null,\n    ticketQuery: '', ntTitolo: '', ntRichiesta: '',\n    driveVista: 'cartelle', driveSel: 0,\n    riuTab: 'wizard', wizStep: 1, wizOrgano: 'Consiglio Direttivo Regionale (CDR)', wizTitolo: 'Consiglio Direttivo Regionale \u2014 settembre 2026', wizData: '2026-09-16', wizOra: '21:00', wizInvitatiOff: {}, wizOdg: '1. Approvazione verbale seduta precedente\\n2. Aggiornamento progetto Sentiero Italia CAI Lombardia\\n3. Candidatura bando FO.S.M.IT 2026\\n4. Varie ed eventuali', wizInviata: false,\n    ragAmbito: 'archivio', ragQuery: '', ragAnswer: null, ragLoading: false, ragCatOff: {}, ragPeriodo: 'tutti',\n    bandiQuery: '', bandiLivello: 'tutti', bandiTema: 'tutti', bandiSoloAperti: false, supportoBando: null, supportoInviato: false,\n    verbaleAperto: 'VB-2026-014',\n    etsRefreshed: false,\n    escSel: null, escInviata: false, escNome: '', escEmail: '',\n    ticketsExtra: [],\n  };\n  componentDidMount() {\n    Promise.resolve([window.__mockdata, window.__archivioCaiModule]).then(([m, a]) => {\n      this.setState({ data: Object.assign({ archivio: a.archivioCai }, m) });\n    });\n    const applyHash = () => {\n      const h = (location.hash || '').replace('#', '');\n      const routes = ['dashboard','ticket','nuovoTicket','drive','riunioni','ricerca','bandi','ets','escursioni'];\n      if (routes.includes(h) && h !== this.state.route) this.setState({ route: h });\n    };\n    applyHash();\n    window.addEventListener('hashchange', applyHash);\n  }\n  go(r) { this.setState({ route: r }); try { history.replaceState(null, '', '#' + r); } catch (e) {} window.scrollTo(0, 0); }\n  badge(stato) {\n    const map = { 'TODO': ['#FCC79A', '#F0A263'], 'IN ATTESA': ['#F2DA8E', '#DFC15C'], 'DA TESTARE': ['#F7ECB4', '#E3D47E'], 'BACKLOG': ['#CDD2D8', '#AEB4BC'], 'COMPLETATO': ['#A5E8BA', '#71D496'], 'NUOVO': ['#BFD9F7', '#8FBCEE'] };\n    const [bg, bd] = map[stato] || map['BACKLOG'];\n    return 'display:inline-block;background:' + bg + ';border:1px solid ' + bd + ';border-radius:99px;padding:3px 11px;font-size:11px;font-weight:800;color:#3f4756;letter-spacing:.03em;';\n  }\n  renderVals() {\n    const S = this.state, D = S.data;\n    const nomeCliente = this.props.nomeCliente ?? 'GR Lombardia';\n    const badgeNovita = this.props.badgeNovita ?? true;\n    const go = (r) => () => this.go(r);\n    const nav = { dashboard: go('dashboard'), ticket: go('ticket'), nuovoTicket: go('nuovoTicket'), bandi: go('bandi'), drive: go('drive'), riunioni: go('riunioni'), ricerca: go('ricerca'), ets: go('ets'), escursioni: go('escursioni') };\n    const itemStyle = (r) => 'display:flex;align-items:center;gap:8px;padding:8px 12px 8px 34px;font-size:13.5px;border-radius:8px;cursor:pointer;' + (S.route === r ? 'background:#eef1f4;color:#17a180;font-weight:700;border:1px solid #dfe6e3;' : 'color:#4a5468;border:1px solid transparent;');\n    const navCliente = [\n      { label: 'Dashboard', go: nav.dashboard, style: itemStyle('dashboard') },\n      { label: 'Nuovo ticket', go: nav.nuovoTicket, style: itemStyle('nuovoTicket') },\n      { label: 'I miei Ticket', go: nav.ticket, style: itemStyle('ticket') },\n      { label: 'Bandi', go: nav.bandi, style: itemStyle('bandi') },\n    ];\n    const navServizi = [\n      { label: 'Drive Standard', go: nav.drive, style: itemStyle('drive'), nuovo: badgeNovita },\n      { label: 'Riunioni e verbali', go: nav.riunioni, style: itemStyle('riunioni'), nuovo: badgeNovita },\n      { label: 'Ricerca CAI (RAG)', go: nav.ricerca, style: itemStyle('ricerca'), nuovo: badgeNovita },\n      { label: 'ETS Dashboard', go: nav.ets, style: itemStyle('ets'), nuovo: badgeNovita },\n      { label: 'Escursioni', go: nav.escursioni, style: itemStyle('escursioni'), nuovo: badgeNovita },\n    ];\n    const crumbs = { dashboard: 'Dashboard', ticket: 'I miei Ticket', nuovoTicket: 'Crea Ticket', bandi: 'Bandi', drive: 'Drive Standard', riunioni: 'Riunioni e verbali', ricerca: 'Ricerca avanzata archivio CAI', ets: 'ETS Dashboard \u2014 controllo RUNTS', escursioni: 'Prenotazione escursioni' };\n    const show = {}; Object.keys(crumbs).forEach(k => show[k] = S.route === k);\n    const vals = {\n      nomeCliente, iniziali: nomeCliente.split(/\\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase(),\n      emailCliente: 'gr_cai_lombardia@cai.it',\n      nav, navCliente, navServizi, crumb: crumbs[S.route] || 'Dashboard', show,\n      stopProp: (e) => e.stopPropagation(),\n    };\n    if (!D) { vals.nTicket = '\u2026'; vals.cardServizi = []; return vals; }\n\n    // dashboard\n    const allTickets = S.ticketsExtra.concat(D.tickets);\n    vals.nTicket = allTickets.length;\n    vals.cardServizi = [\n      { titolo: 'Drive Standard', desc: 'Gestione documentale su Google Drive con le 8 cartelle standard e vista gerarchia.', cta: 'Apri il Drive', go: nav.drive },\n      { titolo: 'Riunioni e verbali', desc: 'Convocazioni con Calendar e Meet, verbale in bozza generato con AI il giorno dopo.', cta: 'Convoca una riunione', go: nav.riunioni },\n      { titolo: 'Ricerca CAI (RAG)', desc: 'Ricerca conversazionale su statuto e regolamenti CAI, verbali e knowledge base.', cta: 'Cerca nell\\u2019archivio', go: nav.ricerca },\n      { titolo: 'ETS Dashboard', desc: 'Controllo qualit\u00e0 dei dati RUNTS e benchmark dei bilanci tra sezioni.', cta: 'Verifica i dati', go: nav.ets },\n      { titolo: 'Escursioni', desc: 'Prenotazione online di eve :13.5px;cursor:pointer;' + (S.driveSel === i ? 'background:#eef7f3;color:#17a180;font-weight:700;' : 'color:#4a5468;') }));\n    const fsel = D.driveTree[S.driveSel];\n    vals.driveSelNome = fsel.nome; vals.driveSelDesc = fsel.desc;\n    vals.driveFiles = fsel.files.map(([nome, data]) => ({ nome, data }));\n    vals.driveHasSub = !!fsel.sub; vals.driveSubs = fsel.sub || [];\n    vals.gerarchiaRoot = D.driveTree.slice(0, 6).map(f => f.nome);\n    vals.gerarchiaSubs = (D.driveTree[6].sub || []).map(s => ({ nome: s.nome }));\n\n    // riunioni\n    vals.riuTabWizard = () => this.setState({ riuTab: 'wizard' });\n    vals.riuTabVerbali = () => this.setState({ riuTab: 'verbali' });\n    vals.riuTabWizardStyle = tabStyle(S.riuTab === 'wizard');\n    vals.riuTabVerbaliStyle = tabStyle(S.riuTab === 'verbali');\n    vals.riuIsWizard = S.riuTab === 'wizard'; vals.riuIsVerbali = S.riuTab === 'verbali';\n    const stepLabels = ['Riunione', 'Invitati', 'ODG', 'Conferma'];\n    vals.wizSteps = stepLabels.map((label, i) => {\n      const n = i + 1, on = S.wizStep === n, done = S.wizStep > n;\n      return { n: done ? '\u2713' : String(n), label,\n        dotStyle: 'width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;' + (on ? 'background:#17a180;color:#fff;' : done ? 'background:#e5f6ef;color:#17a180;border:1px solid #9fdcc9;' : 'background:#eceef1;color:#8b93a3;'),\n        lblStyle: 'font-size:12.5px;font-weight:700;' + (on ? 'color:#17a180;' : 'color:#8b93a3;') };\n    });\n    for (let i = 1; i <= 4; i++) vals['wizIs' + i] = S.wizStep === i;\n    vals.wizOrgano = S.wizOrgano; vals.setWizOrgano = (e) => this.setState({ wizOrgano: e.target.value });\n    vals.wizTitolo = S.wizTitolo; vals.setWizTitolo = (e) => this.setState({ wizTitolo: e.target.value });\n    vals.wizData = S.wizData; vals.setWizData = (e) => this.setState({ wizData: e.target.value });\n    vals.wizOra = S.wizOra; vals.setWizOra =
